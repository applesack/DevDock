<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevDock</title>
    <style>
      :root {
        font-family: "Segoe UI", sans-serif;
        color: #e7edf7;
        background: #111827;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(420px, calc(100vw - 48px));
        padding: 32px;
        border: 1px solid #334155;
        border-radius: 16px;
        background: #1e293b;
        box-shadow: 0 24px 60px rgb(0 0 0 / 30%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: #a8b3c7;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DevDock is running</h1>
      <p>Use the system tray menu to manage your local development services.</p>
    </main>
  </body>
</html>
